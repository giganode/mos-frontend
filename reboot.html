<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Waiting for reboot...</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          'Helvetica Neue',
          Arial;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f7f7f7;
        color: #111;
      }
      .msg {
        font-size: 1.1rem;
        margin-bottom: 1.5rem;
      }
      .note {
        font-size: 0.9rem;
        color: #555;
        margin-top: 1.2rem;
      }
      .dots {
        display: flex;
        gap: 10px;
      }
      .dots span {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #0078d4;
        animation: bounce 1.2s infinite ease-in-out;
      }
      .dots span:nth-child(1) { animation-delay: 0s; }
      .dots span:nth-child(2) { animation-delay: 0.2s; }
      .dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40%            { transform: scale(1.0); opacity: 1;   }
      }
      .status {
        font-size: 0.85rem;
        color: #888;
        margin-top: 0.8rem;
        min-height: 1.2em;
      }
      @media (prefers-color-scheme: dark) {
        .wrap {
          background: #1a1a1a;
          color: #eee;
        }
        .note {
          color: #aaa;
        }
        .status {
          color: #777;
        }
        .logo {
          filter: invert(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div><img class="logo" src="mos_icon.svg" alt="MOS Icon" width="350" style="padding-bottom: 28px;"/></div>
      <div class="msg">Server is restarting...</div>
      <div class="dots">
        <span></span><span></span><span></span>
      </div>
      <div id="status" class="status">Waiting for shutdown...</div>
      <div class="note">You will be redirected automatically once the system is back.</div>
    </div>

    <script>
      const POLL_INTERVAL_MS = 5_000;
      const FETCH_TIMEOUT_MS = 3_000;
      const MAX_WAIT_MS      = 10 * 60 * 1_000;

      const ENDPOINT = `${window.location.origin}/api/v1/auth/firstsetup`;

      const statusEl = document.getElementById('status');

      async function isReachable() {
        const controller = new AbortController();
        const t = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);
        try {
          const res = await fetch(ENDPOINT, {
            method: 'GET',
            signal: controller.signal,
            cache: 'no-store',
          });
          clearTimeout(t);
          return res.ok;
        } catch (_) {
          return false;
        } finally {
          clearTimeout(t);
        }
      }

      function showTimeout() {
        statusEl.textContent = 'Reboot is taking longer than expected.';
        document.querySelector('.dots').style.visibility = 'hidden';
        const btn = document.createElement('button');
        btn.textContent = 'Try reloading manually';
        btn.style.cssText = 'margin-top:1.2rem;padding:0.6rem 1rem;font-size:1rem;border:0;border-radius:6px;background:#0078d4;color:#fff;cursor:pointer;';
        btn.onclick = () => window.location.href = '/';
        document.querySelector('.wrap').appendChild(btn);
      }

      async function waitAndRedirect() {
        const deadline = Date.now() + MAX_WAIT_MS;
        const timedOut = () => Date.now() >= deadline;

        // Wait until the endpoint doesn't answer anymore
        statusEl.textContent = 'Waiting for shutdown...';
        while (await isReachable()) {
          if (timedOut()) { showTimeout(); return; }
          await new Promise(r => setTimeout(r, POLL_INTERVAL_MS));
        }

        // Wait, again, until the endpoint answers again
        statusEl.textContent = 'Waiting for system to come back...';
        while (!(await isReachable())) {
          if (timedOut()) { showTimeout(); return; }
          await new Promise(r => setTimeout(r, POLL_INTERVAL_MS));
        }

        // Redirect to Dashbaord
        statusEl.textContent = 'System is back online, redirecting...';
        await new Promise(r => setTimeout(r, 800));
        window.location.href = '/';
      }

      window.addEventListener('DOMContentLoaded', waitAndRedirect);
    </script>
  </body>
</html>
